name: Deploy web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply flowly-db --remote --config apps/web/wrangler.jsonc

      - name: Deploy web worker
        run: npm run deploy:production --workspace @flowly/web
