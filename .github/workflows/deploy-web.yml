name: Deploy web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check Cloudflare token
        id: cloudflare-token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN is not configured; skipping Cloudflare deploy."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.cloudflare-token.outputs.enabled == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.cloudflare-token.outputs.enabled == 'true'
        run: npm run typecheck

      - name: Lint
        if: steps.cloudflare-token.outputs.enabled == 'true'
        run: npm run lint

      - name: Apply D1 migrations
        if: steps.cloudflare-token.outputs.enabled == 'true'
        run: npx wrangler d1 migrations apply flowly-db --remote --config apps/web/wrangler.jsonc

      - name: Deploy web worker
        if: steps.cloudflare-token.outputs.enabled == 'true'
        run: npm run deploy:production --workspace @flowly/web
